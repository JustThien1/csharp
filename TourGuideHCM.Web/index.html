<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tour Guide HCM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1f1f1f;
            --border: rgba(255,255,255,0.07);
            --accent: #e8a850;
            --accent2: #d4763a;
            --text: #f0ece4;
            --text-muted: #8a8279;
            --red: #e05252;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #map {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: brightness(0.85) saturate(0.8);
        }

        /* ─── SIDEBAR ─── */
        #sidebar {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 300px;
            background: rgba(14, 14, 14, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            z-index: 1000;
            overflow: hidden;
            max-height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 20px 20px 0;
            flex-shrink: 0;
        }

        .app-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }

            .search-wrap svg {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
            }

        #search {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

            #search::placeholder {
                color: var(--text-muted);
            }

            #search:focus {
                border-color: var(--accent);
            }

        .section-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 20px 8px;
            flex-shrink: 0;
        }

        #poi-list {
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }

            #poi-list::-webkit-scrollbar {
                width: 4px;
            }

            #poi-list::-webkit-scrollbar-track {
                background: transparent;
            }

            #poi-list::-webkit-scrollbar-thumb {
                background: var(--surface2);
                border-radius: 4px;
            }

        .poi-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

            .poi-item:hover {
                background: rgba(232, 168, 80, 0.06);
            }

        .poi-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 5px;
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--accent);
        }

        .poi-info {
            flex: 1;
            min-width: 0;
        }

        .poi-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .poi-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ─── AUDIO PLAYER ─── */
        #player {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(14, 14, 14, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            z-index: 1000;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }

        .player-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        #now-playing {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            gap: 8px;
        }

        .ctrl-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s, border-color 0.2s;
        }

            .ctrl-btn:hover {
                background: rgba(232, 168, 80, 0.12);
                border-color: var(--accent);
            }

        /* ─── GPS BUTTON ─── */
        #gps-btn {
            position: absolute;
            bottom: 90px;
            right: 16px;
            background: rgba(14, 14, 14, 0.92);
            backdrop-filter: blur(20px);
            color: var(--accent);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.15s;
        }

            #gps-btn:hover {
                background: rgba(232, 168, 80, 0.12);
                transform: scale(1.05);
            }

        /* ─── LEAFLET POPUP ─── */
        .leaflet-popup-content-wrapper {
            background: rgba(14,14,14,0.96) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--border) !important;
            border-radius: 16px !important;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5) !important;
            color: var(--text) !important;
            padding: 0 !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            padding: 16px 18px !important;
            font-family: 'DM Sans', sans-serif !important;
        }

        .leaflet-popup-tip {
            background: rgba(14,14,14,0.96) !important;
        }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            top: 10px !important;
            right: 12px !important;
        }

        .popup-name {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .popup-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .popup-actions {
            display: flex;
            gap: 8px;
        }

        .popup-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: opacity 0.2s;
        }

            .popup-btn:hover {
                opacity: 0.85;
            }

        .popup-btn-audio {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0d0d0d;
        }

        .popup-btn-nav {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            #sidebar {
                width: calc(100vw - 32px);
                max-height: 45vh;
            }

            #player {
                left: 16px;
                right: 16px;
            }
        }

        /* ─── PULSE on playing ─── */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 6px var(--accent);
            }

            50% {
                box-shadow: 0 0 14px var(--accent), 0 0 4px var(--accent2);
            }
        }

        .playing .poi-dot {
            animation: pulse 1.4s ease-in-out infinite;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="app-title">Sài Gòn Guide</div>
            <div class="app-subtitle">Hồ Chí Minh City</div>
            <div class="search-wrap">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input id="search" placeholder="Tìm địa điểm..." />
            </div>
        </div>
        <div class="section-label">Địa điểm nổi bật</div>
        <div id="poi-list"></div>
    </div>

    <!-- AUDIO PLAYER -->
    <div id="player">
        <div class="player-icon">🎧</div>
        <div class="player-info">
            <div class="player-label">Đang phát</div>
            <div id="now-playing">Chưa phát âm thanh</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="stopAudio()" title="Dừng">⏹</button>
        </div>
    </div>

    <!-- GPS BUTTON -->
    <button id="gps-btn" onclick="goToMyLocation()" title="Vị trí của tôi">📍</button>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // @ts-nocheck
        /* global L */
        var pois = [];
        var markers = [];
        var currentAudio = null;
        var userMarker = null;

        var leafletMap = L.map('map', { zoomControl: false }).setView([10.7769, 106.7009], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(leafletMap);

        L.control.zoom({ position: 'topright' }).addTo(leafletMap);

        function makeIcon(active) {
            var border = active ? '#fff' : 'rgba(255,255,255,0.5)';
            var shadow = active ? '12px' : '6px';
            var op = active ? 0.9 : 0.5;
            return L.divIcon({
                className: '',
                html: '<div style="width:14px;height:14px;border-radius:50%;background:#e8a850;border:3px solid ' + border + ';box-shadow:0 0 ' + shadow + ' rgba(232,168,80,' + op + ');"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7],
                popupAnchor: [0, -10]
            });
        }

        async function loadPOI() {
            var res = await fetch('http://localhost:5284/api/poi');
            pois = await res.json();
            renderList(pois);
            pois.forEach(function (poi) {
                var marker = L.marker([poi.lat, poi.lng], { icon: makeIcon(false) }).addTo(leafletMap);
                marker.bindPopup(
                    '<div class="popup-name">' + poi.name + '</div>' +
                    '<div class="popup-desc">' + poi.description + '</div>' +
                    '<div class="popup-actions">' +
                    '<button class="popup-btn popup-btn-audio" onclick="playAudio(\'' + poi.audioUrl + '\',\'' + poi.name + '\')">🎧 Nghe</button>' +
                    '<a class="popup-btn popup-btn-nav" href="https://www.google.com/maps/dir/?api=1&destination=' + poi.lat + ',' + poi.lng + '" target="_blank">🧭 Chỉ đường</a>' +
                    '</div>'
                );
                markers.push({ marker: marker, poi: poi });
                L.circle([poi.lat, poi.lng], {
                    radius: poi.radius,
                    color: '#e8a850',
                    weight: 1,
                    fillColor: '#e8a850',
                    fillOpacity: 0.08
                }).addTo(leafletMap);
            });
        }

        loadPOI();

        function renderList(data) {
            var list = document.getElementById('poi-list');
            if (!list) return;
            list.innerHTML = '';
            data.forEach(function (poi) {
                var div = document.createElement('div');
                div.className = 'poi-item';
                div.id = 'poi-' + (poi.id != null ? String(poi.id) : poi.name);
                div.innerHTML =
                    '<div class="poi-dot"></div>' +
                    '<div class="poi-info">' +
                    '<div class="poi-name">' + poi.name + '</div>' +
                    '<div class="poi-desc">' + poi.description + '</div>' +
                    '</div>';
                div.onclick = function () { goToPOI(poi); };
                list.appendChild(div);
            });
        }

        var searchEl = /** @type {HTMLInputElement} */ (document.getElementById('search'));
        if (searchEl) {
            searchEl.addEventListener('input', function () {
                var keyword = searchEl.value.toLowerCase();
                var filtered = pois.filter(function (p) { return p.name.toLowerCase().includes(keyword); });
                renderList(filtered);
            });
        }

        function goToPOI(poi) {
            leafletMap.setView([poi.lat, poi.lng], 17);
            var entry = markers.find(function (m) { return m.poi === poi; });
            if (entry) { entry.marker.openPopup(); }
        }

        function playAudio(url, name) {
            if (!url) return;
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(url);
            currentAudio.play();
            var el = document.getElementById('now-playing');
            if (el) { el.innerText = name || url; }
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            var el = document.getElementById('now-playing');
            if (el) { el.innerText = 'Chưa phát âm thanh'; }
        }

        function goToMyLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(function (pos) {
                var lat = pos.coords.latitude;
                var lng = pos.coords.longitude;
                var userIcon = L.divIcon({
                    className: '',
                    html: '<div style="width:16px;height:16px;border-radius:50%;background:#4fc3f7;border:3px solid #fff;box-shadow:0 0 0 6px rgba(79,195,247,0.2);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(leafletMap);
                }
                leafletMap.setView([lat, lng], 15);
            });
        }
    </script>
</body>
</html>
