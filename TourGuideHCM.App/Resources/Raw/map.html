<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TourGuide Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="leaflet.js"></script>
    <script>
        console.log("✅ MAP HTML LOADED - Version FIXED 2026-04-09");
        var map = L.map('map').setView([10.7769, 106.7009], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        delete L.Icon.Default.prototype._getIconUrl;
        L.Icon.Default.mergeOptions({
            iconRetinaUrl: 'images/marker-icon-2x.png',
            iconUrl: 'images/marker-icon.png',
            shadowUrl: 'images/marker-shadow.png'
        });

        window.loadFromApp = function (pois) {
            console.log("📥 loadFromApp called with " + pois.length + " POIs");
            map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
            pois.forEach(p => {
                if (p.lat && p.lng) L.marker([p.lat, p.lng]).addTo(map).bindPopup("<b>" + p.name + "</b><br>" + (p.description || ""));
            });
            console.log("✅ Markers added");
        };

        window.goToLocation = function (lat, lng) {
            console.log("🚀 goToLocation: " + lat + ", " + lng);
            map.flyTo([lat, lng], 17);
        };

        console.log("✅ MAP READY - Leaflet initialized");
    </script>
</body>
</html>
